<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyanta - Trip Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #0F172A;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748B;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px 5px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .button-secondary {
            background: #F0F4F8;
            color: #667eea;
            border: 2px solid #E2E8F0;
        }

        .button-secondary:hover {
            background: #E2E8F0;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #F0F4F8;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            display: none;
            background: #FEE2E2;
            color: #DC2626;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }

        .info-text {
            font-size: 14px;
            color: #94A3B8;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌍</div>
        <h1 id="title">Opening Trip...</h1>
        <p class="subtitle" id="subtitle">Getting ready to show you the trip details</p>
       
        <div class="loading">
            <div class="spinner"></div>
        </div>

        <div id="buttons">
            <!-- Buttons will be inserted here by JavaScript -->
        </div>

        <div class="error" id="error"></div>

        <p class="info-text">
            <strong>Not opening?</strong> Tap the button below or search for the trip in the app.
        </p>
    </div>

    <script>
        function handleDeepLink() {
            // Get the trip ID from URL
            // URL format: https://yourusername.github.io/voyanta-deeplink/?trip=TRIP_ID
            // OR: https://yourusername.github.io/voyanta-deeplink/#trip=TRIP_ID
           
            const params = new URLSearchParams(window.location.search);
            const hash = new URLSearchParams(window.location.hash.substring(1));
           
            let tripId = params.get('trip') || hash.get('trip');

            if (!tripId) {
                // Try to get from path: /trip/TRIP_ID or similar
                const pathParts = window.location.pathname.split('/');
                for (let i = 0; i < pathParts.length - 1; i++) {
                    if (pathParts[i] === 'trip' && pathParts[i + 1]) {
                        tripId = pathParts[i + 1];
                        break;
                    }
                }
            }

            if (!tripId) {
                showError('Invalid trip link - no trip ID found. Please try again.');
                return;
            }

            // Update page title
            document.getElementById('title').textContent = 'Opening Trip...';
            document.getElementById('subtitle').textContent = `Trip ID: ${tripId}`;
            document.querySelector('.loading').style.display = 'block';

            // Deep link URLs
            const deepLinkUrl = `voyanta://trip/${tripId}`;
            const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.voyanta.app';

            // Try to open the app
            const startTime = Date.now();
            window.location.href = deepLinkUrl;

            // If app didn't open after 1.5 seconds, redirect to Play Store
            const timeout = setTimeout(() => {
                const elapsed = Date.now() - startTime;
                if (elapsed > 1500) {
                    window.location.href = playStoreUrl;
                }
            }, 1500);

            // Show fallback buttons in case user wants to manually choose
            document.getElementById('buttons').innerHTML = `
                <a href="${deepLinkUrl}" class="button button-primary">
                    Open in Voyanta
                </a>
                <a href="${playStoreUrl}" class="button button-secondary">
                    Download from Play Store
                </a>
            `;
        }

        function showError(message) {
            document.querySelector('.loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
           
            document.getElementById('buttons').innerHTML = `
                <a href="https://play.google.com/store/apps/details?id=com.voyanta.app" class="button button-primary">
                    Download Voyanta
                </a>
            `;
        }

        // When user comes back to browser (app didn't open)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                const params = new URLSearchParams(window.location.search);
                const tripId = params.get('trip');

                if (tripId) {
                    document.getElementById('buttons').innerHTML = `
                        <a href="voyanta://trip/${tripId}" class="button button-primary">
                            Open in Voyanta
                        </a>
                        <a href="https://play.google.com/store/apps/details?id=com.voyanta.app" class="button button-secondary">
                            Download App
                        </a>
                    `;
                }
            }
        });

        // Run on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', handleDeepLink);
        } else {
            handleDeepLink();
        }
    </script>
</body>
</html>
